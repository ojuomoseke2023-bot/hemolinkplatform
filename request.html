<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Order Ingestion | HemoLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="sticky top-0 z-50 bg-[#0B0F19]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-bold text-2xl text-white">
        <span class="text-[#C1121F]">🩸</span>Hemo<span class="text-[#C1121F]">Link</span>
      </a>
      <div id="nav-menu" class="hidden lg:flex items-center gap-8 text-sm font-medium text-gray-300">
        <a href="index.html" class="hover:text-white transition-colors">Home</a>
        <a href="donor.html" class="hover:text-white transition-colors">Donor Registration</a>
        <a href="request.html" class="text-white border-b-2 border-[#C1121F] pb-1">Request Blood</a>
        <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
        <a href="about.html" class="hover:text-white transition-colors">About</a>
        <a href="contact.html" class="hover:text-white transition-colors">Contact</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-16">
    <div class="glass-panel p-8 md:p-12 border border-red-950 bg-red-950/10 rounded-2xl relative shadow-2xl">
      <div class="absolute inset-0 bg-radial-gradient from-red-600/5 to-transparent pointer-events-none rounded-2xl"></div>
      <div class="mb-8 flex items-center gap-4">
        <div class="w-3 h-3 bg-red-500 rounded-full animate-ping"></div>
        <div>
          <h2 class="text-3xl font-bold mb-2 text-white">Submit Emergency Request</h2>
          <p class="text-red-400/80 text-sm">Direct priority routing. AI processing initializes instantly upon submission.</p>
        </div>
      </div>
      <form onsubmit="handleFormSubmit(event, 'Emergency broadcast dispatched to local donor pools.')" class="space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-xs text-gray-400 font-semibold uppercase">Hospital Registry Name</label>
            <input type="text" required class="form-input border-red-900/40" placeholder="Federal Medical Centre">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs text-gray-400 font-semibold uppercase">Required Phenotype</label>
            <select required class="form-input border-red-900/40">
              <option value="O-">O Negative (Universal)</option>
              <option value="O+">O Positive</option>
              <option value="A-">A Negative</option>
              <option value="A+">A Positive</option>
              <option value="B-">B Negative</option>
              <option value="B+">B Positive</option>
              <option value="AB-">AB Negative</option>
              <option value="AB+">AB Positive</option>
            </select>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs text-gray-400 font-semibold uppercase">Volume (Units Required)</label>
            <input type="number" min="1" max="20" required class="form-input border-red-900/40" placeholder="3">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs text-gray-400 font-semibold uppercase">Urgency Operational Tier</label>
            <select required class="form-input border-red-900/40 text-red-400 bg-slate-950">
              <option value="critical">CRITICAL (Immediate Threat - Under 15 Mins)</option>
              <option value="high">HIGH (Surgical Prep - Under 2 Hours)</option>
            </select>
          </div>
        </div>
        <button type="submit" class="w-full mt-4 py-4 bg-[#C1121F] hover:bg-red-700 text-white font-bold rounded-xl shadow-lg transition-all tracking-wider uppercase text-sm">Submit Emergency Request</button>
      </form>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
